device: auto

backbone:
  name: resnet50_fpn
  pretrained: true

dataset:
  root: ./dataset
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  classes:
    - scratch
    - dent
    - crack
  num_classes: 4

augmentation:
  mosaic:
    enabled: true
    prob: 0.5
  cutmix:
    enabled: true
    prob: 0.3
    alpha: 1.0
  hflip: true
  vflip: false
  random_crop: true
  color_jitter: true

training:
  batch_size: 4
  epochs: 50
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler:
    type: cosine
    warmup_epochs: 3
    min_lr: 1.0e-06

callbacks:
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
  checkpoint:
    enabled: true
    save_dir: ./checkpoints
    save_best: true
    monitor: val_loss
  logging:
    log_dir: ./logs
    log_interval: 10

inference:
  score_threshold: 0.5
  nms_threshold: 0.5
  image_size: 800

evaluation:
  iou_threshold: 0.5

http_api:
  host: 0.0.0.0
  port: 8000
